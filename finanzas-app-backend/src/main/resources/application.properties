# ==========================================================================
# CONFIGURACIÓN — FinanceTracker (finanzas_db)
# ==========================================================================

# ---- Conexión a Base de Datos (MySQL 8.0) ----
spring.datasource.url=jdbc:mysql://localhost:3306/finanzas_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ---- Servidor ----
server.port=${PORT:8081}

# ==========================================================================
# LOGGING — Operación del Servicio TI
# Evidencia de monitoreo: logs a archivo con rotación y niveles por capa
# ==========================================================================

# ---- Log a archivo ----
logging.file.name=logs/finanzas-app.log

# ---- Rotación de archivos de log ----
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=35MB

# ---- Formato del log ----
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

# ---- Nivel raíz ----
logging.level.root=INFO

# ---- Niveles por capa de la aplicación (DDD) ----
# Capa de interfaces (controllers): registra cada petición HTTP
logging.level.com.utp.finanzasApp.sales.interfaces.controller=INFO
# Capa de aplicación (services): registra lógica de negocio
logging.level.com.utp.finanzasApp.sales.application.service=INFO
# Capa de dominio: solo errores
logging.level.com.utp.finanzasApp.sales.domain=WARN
# Capa de infraestructura (repositorios JPA): solo errores
logging.level.com.utp.finanzasApp.sales.infrastructure=WARN
# Soporte (JWT, Seguridad): info de autenticación
logging.level.com.utp.finanzasApp.support=INFO

# ---- Niveles de frameworks ----
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN